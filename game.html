<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>地震小游戏 - 济小震</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar"><div class="logo"><i class="fas fa-satellite-dish"></i> 济小震</div><ul class="nav-links"><li><a href="index.html">首页</a></li><li><a href="knowledge.html">地震常识</a></li><li><a href="news.html">地震新闻</a></li><li><a href="emergency.html">应急求助</a></li><li><a href="game.html">地震小游戏</a></li></ul></nav>
    <div class="container">
        <div class="card">
            <h2><i class="fas fa-gamepad"></i> 受灾模拟 </h2>
            <div class="game-canvas-placeholder" id="gameCanvas">
                <i class="fas fa-dice-d6" style="font-size: 4rem; color: cyan;"></i>
                <p>游戏画布（高子宣实现Canvas动画与计分逻辑）</p>
            </div>
            <div style="margin-top: 1.5rem; text-align: center; display: flex; gap: 1rem; justify-content: center;">
                <button id="startGameBtn" class="btn">开始挑战</button>
                <button id="actionBtn" class="btn" style="background: linear-gradient(135deg, #ff8c42, #d43f00);">结束</button>
            </div>
            <div id="gameScore" style="text-align: center; margin-top: 1rem; font-size: 1.5rem; color: cyan;"></div>
        </div>
    </div>
    <script src="js/common.js"></script>
</body>
</html>
