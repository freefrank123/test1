<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震小游戏 - 济小震</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fas fa-shield-halved"></i> 济小震 · 智防未来</div>
        <ul class="nav-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="knowledge.html">地震常识</a></li>
            <li><a href="news.html">地震新闻</a></li>
            <li><a href="emergency.html">应急求助</a></li>
            <li><a href="game.html">地震小游戏</a></li>
        </ul>
        <button class="theme-toggle" id="themeToggle">
            <i class="fas fa-moon"></i>
        </button>
    </nav>

    <div class="container">
        <header class="hero-card" style="padding: 2rem 2rem; margin-bottom: 2rem; background: linear-gradient(135deg, #7c3aed 0%, #a855f7 40%, #f97316 100%);">
            <h1 style="font-size: 2.2rem;"><i class="fas fa-gamepad"></i> 地震避险模拟训练</h1>
            <p>沉浸式情景体验 · 锻炼应急反应能力</p>
        </header>

        <div class="card">
            <h2><i class="fas fa-dice-d6"></i> 受灾模拟</h2>
            <div class="game-canvas-placeholder" id="gameCanvas">
                <i class="fas fa-dice-d6" style="font-size: 4.5rem; display:block; margin-bottom:1rem; opacity:.4;"></i>
                <p style="font-size:1.05rem;">游戏画布 — Canvas 动画与计分逻辑</p>
                <p style="font-size:.85rem;opacity:.5;">高子宣开发中</p>
            </div>
            <div style="margin-top: 1.5rem; text-align: center; display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                <button id="startGameBtn" class="btn-primary"><i class="fas fa-play"></i> 开始挑战</button>
                <button id="pauseGameBtn" class="btn-secondary"><i class="fas fa-pause"></i> 暂停</button>
                <button id="resetGameBtn" class="btn-secondary"><i class="fas fa-rotate-right"></i> 重新开始</button>
            </div>
            <div id="gameScore">得分：0</div>
        </div>
    </div>

    <footer>&copy; 2025 济小震 · 科技防灾平台 | 寓教于乐 · 安全同行</footer>

    <script src="js/common.js"></script>
</body>
</html>
